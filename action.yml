name: kube-diff Action
description: Compare local Kubernetes manifests against live cluster state and report drift
author: somaz94

branding:
  icon: git-pull-request
  color: blue

inputs:
  source:
    description: 'Source type: file, helm, or kustomize'
    required: true
  path:
    description: 'Path to manifests, Helm chart, or Kustomize overlay'
    required: true
  values:
    description: 'Helm values files (comma-separated)'
    required: false
    default: ''
  release:
    description: 'Helm release name'
    required: false
    default: 'release'
  namespace:
    description: 'Filter by namespace'
    required: false
    default: ''
  kind:
    description: 'Filter by resource kind (comma-separated)'
    required: false
    default: ''
  name:
    description: 'Filter by resource name (comma-separated)'
    required: false
    default: ''
  selector:
    description: 'Filter by label selector (e.g., app=nginx,env=prod)'
    required: false
    default: ''
  output:
    description: 'Output format for diff result: color, plain, json, markdown'
    required: false
    default: 'markdown'
  summary-only:
    description: 'Show summary only without diff details'
    required: false
    default: 'false'
  ignore-field:
    description: 'Field paths to ignore in diff (comma-separated, dot notation)'
    required: false
    default: ''
  context-lines:
    description: 'Number of context lines in diff output'
    required: false
    default: ''
  exit-code:
    description: 'Always exit 0 even when changes are detected'
    required: false
    default: 'false'
  diff-strategy:
    description: 'Comparison strategy: live (cluster state) or last-applied (annotation)'
    required: false
    default: ''
  comment:
    description: 'Post diff result as PR comment'
    required: false
    default: 'true'
  version:
    description: 'kube-diff version to install (e.g., v0.2.0). Default: latest'
    required: false
    default: 'latest'
  token:
    description: 'GitHub token for PR comments and authenticating the version lookup (raises the GitHub API rate limit). Default: github.token'
    required: false
    default: ${{ github.token }}

outputs:
  result:
    description: 'Diff output text'
    value: ${{ steps.diff.outputs.result }}
  exit-code:
    description: 'Exit code from kube-diff (0=no changes, 1=changes detected)'
    value: ${{ steps.diff.outputs.exit-code }}
  has-changes:
    description: 'Whether changes were detected (true/false)'
    value: ${{ steps.diff.outputs.has-changes }}

runs:
  using: composite
  steps:
    - name: Install kube-diff
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        GITHUB_TOKEN: ${{ inputs.token }}
      run: ${{ github.action_path }}/scripts/install.sh

    - name: Run kube-diff
      id: diff
      shell: bash
      env:
        INPUT_SOURCE: ${{ inputs.source }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_VALUES: ${{ inputs.values }}
        INPUT_RELEASE: ${{ inputs.release }}
        INPUT_NAMESPACE: ${{ inputs.namespace }}
        INPUT_KIND: ${{ inputs.kind }}
        INPUT_NAME: ${{ inputs.name }}
        INPUT_SELECTOR: ${{ inputs.selector }}
        INPUT_OUTPUT: ${{ inputs.output }}
        INPUT_SUMMARY_ONLY: ${{ inputs.summary-only }}
        INPUT_IGNORE_FIELD: ${{ inputs.ignore-field }}
        INPUT_CONTEXT_LINES: ${{ inputs.context-lines }}
        INPUT_EXIT_CODE: ${{ inputs.exit-code }}
        INPUT_DIFF_STRATEGY: ${{ inputs.diff-strategy }}
      run: ${{ github.action_path }}/scripts/run.sh

    - name: Comment on PR
      if: inputs.comment == 'true' && github.event_name == 'pull_request' && steps.diff.outputs.result != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        DIFF_RESULT: ${{ steps.diff.outputs.result }}
        HAS_CHANGES: ${{ steps.diff.outputs.has-changes }}
      run: ${{ github.action_path }}/scripts/comment.sh
